<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SSCS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/admin.css">
</head>

<body>

    <nav>
        <div class="nav-inner">
            <a href="../index.html" class="logo">
                <div class="logo-mark">SS</div>
                <div class="logo-text">
                    <strong>SSCS</strong>
                    <span>Social Security Complaint Site</span>
                </div>
            </a>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">

            <div class="auth-header">
                <div class="auth-icon">
                    <!-- Heroicons: lock-closed -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                    </svg>
                </div>
                <h1 class="auth-title">Admin Login</h1>
                <p class="auth-sub">Sign in to access the admin dashboard</p>
            </div>

            <div class="auth-error" id="loginError"></div>

            <form id="loginForm">
                <div class="field">
                    <label for="email">Email Address <span class="req">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com"
                        autocomplete="email">
                </div>
                <div class="field">
                    <label for="password">Password <span class="req">*</span></label>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password" required placeholder="Your password"
                            autocomplete="current-password">
                        <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
                            <!-- Heroicons: eye -->
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="field-row-space">
                    <a href="./forgot.html" class="forgot-link">Forgot your password?</a>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
            </form>

            <p class="auth-footer-note">Don't have an account? <a href="./register.html">Register here</a></p>
            <p class="auth-footer-note"><a href="../index.html">← Back to main site</a></p>

        </div>
    </main>

    <script src="../scripts/admin.js"></script>
</body>

</html>
