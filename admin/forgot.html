<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SSCS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/admin.css">
</head>

<body>

    <nav>
        <div class="nav-inner">
            <a href="../index.html" class="logo">
                <div class="logo-mark">SS</div>
                <div class="logo-text">
                    <strong>SSCS</strong>
                    <span>Social Security Complaint Site</span>
                </div>
            </a>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">

            <div class="auth-header">
                <div class="auth-icon">
                    <!-- Heroicons: key -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 0 1 21.75 8.25Z" />
                    </svg>
                </div>
                <h1 class="auth-title">Forgot Password</h1>
                <p class="auth-sub">Enter your email and we will send you a reset link</p>
            </div>

            <div class="auth-error" id="forgotError"></div>
            <div class="auth-success" id="forgotSuccess"></div>

            <form id="forgotForm">
                <div class="field">
                    <label for="email">Email Address <span class="req">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com"
                        autocomplete="email">
                </div>
                <button type="submit" class="btn-primary" id="forgotBtn">Send Reset Link</button>
            </form>

            <p class="auth-footer-note">Remember your password? <a href="./login.html">Sign in here</a></p>
            <p class="auth-footer-note"><a href="../index.html">← Back to main site</a></p>

        </div>
    </main>

    <script src="../scripts/admin.js"></script>
</body>

</html>
