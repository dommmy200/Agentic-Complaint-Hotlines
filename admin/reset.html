<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SSCS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/admin.css">
</head>

<body>

    <nav>
        <div class="nav-inner">
            <a href="../index.html" class="logo">
                <div class="logo-mark">SS</div>
                <div class="logo-text">
                    <strong>SSCS</strong>
                    <span>Social Security Complaint Site</span>
                </div>
            </a>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">

            <!-- Invalid token state -->
            <div id="invalidToken" class="hidden">
                <div class="auth-header">
                    <div class="auth-icon error">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
                        </svg>
                    </div>
                    <h1 class="auth-title">Invalid Link</h1>
                    <p class="auth-sub">This password reset link is invalid or has expired. Please request a new one.
                    </p>
                </div>
                <a href="./forgot.html" class="btn-primary"
                    style="display:block;text-align:center;text-decoration:none;margin-top:8px;">Request New Link</a>
                <p class="auth-footer-note"><a href="./login.html">← Back to Login</a></p>
            </div>

            <!-- Reset form state -->
            <div id="resetFormWrap">
                <div class="auth-header">
                    <div class="auth-icon">
                        <!-- Heroicons: lock-open -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M13.5 10.5V6.75a4.5 4.5 0 0 1 9 0v3.75M3.75 21.75h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H3.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                        </svg>
                    </div>
                    <h1 class="auth-title">Reset Password</h1>
                    <p class="auth-sub">Enter your new password below</p>
                </div>

                <div class="auth-error" id="resetError"></div>
                <div class="auth-success" id="resetSuccess"></div>

                <form id="resetForm">
                    <div class="field">
                        <label for="password">New Password <span class="req">*</span></label>
                        <div class="input-wrap">
                            <input type="password" id="password" name="password" required
                                placeholder="Min. 8 characters" autocomplete="new-password">
                            <button type="button" class="toggle-pw" id="togglePw"
                                aria-label="Toggle password visibility">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                    <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                </svg>
                            </button>
                        </div>
                        <div class="password-strength" id="passwordStrength"></div>
                    </div>
                    <div class="field">
                        <label for="confirmPassword">Confirm New Password <span class="req">*</span></label>
                        <div class="input-wrap">
                            <input type="password" id="confirmPassword" name="confirmPassword" required
                                placeholder="Repeat your new password" autocomplete="new-password">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="resetBtn">Reset Password</button>
                </form>

                <p class="auth-footer-note"><a href="./login.html">← Back to Login</a></p>
            </div>

        </div>
    </main>

    <script src="../scripts/admin.js"></script>
</body>

</html>
