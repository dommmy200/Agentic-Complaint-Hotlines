<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Register | SSCS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/admin.css">
</head>

<body>

    <nav>
        <div class="nav-inner">
            <a href="../index.html" class="logo">
                <div class="logo-mark">SS</div>
                <div class="logo-text">
                    <strong>SSCS</strong>
                    <span>Social Security Complaint Site</span>
                </div>
            </a>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">

            <div class="auth-header">
                <div class="auth-icon">
                    <!-- Heroicons: user-plus -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
                    </svg>
                </div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-sub">Register as an administrator</p>
            </div>

            <div class="auth-error" id="registerError"></div>
            <div class="auth-success" id="registerSuccess"></div>

            <form id="registerForm">
                <div class="field">
                    <label for="email">Email Address <span class="req">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com"
                        autocomplete="email">
                </div>
                <div class="field">
                    <label for="password">Password <span class="req">*</span></label>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password" required placeholder="Min. 8 characters"
                            autocomplete="new-password">
                        <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                <div class="field">
                    <label for="confirmPassword">Confirm Password <span class="req">*</span></label>
                    <div class="input-wrap">
                        <input type="password" id="confirmPassword" name="confirmPassword" required
                            placeholder="Repeat your password" autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
            </form>

            <p class="auth-footer-note">Already have an account? <a href="./login.html">Sign in here</a></p>
            <p class="auth-footer-note"><a href="../index.html">← Back to main site</a></p>

        </div>
    </main>

    <script src="../scripts/admin.js"></script>
</body>

</html>
