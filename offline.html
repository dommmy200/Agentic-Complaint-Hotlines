<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Connection | SSCS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles/error.css">
</head>

<body>

    <nav>
        <div class="nav-inner">
            <a href="./index.html" class="logo">
                <div class="logo-mark">SS</div>
                <div class="logo-text">
                    <strong>SSCS</strong>
                    <span>Social Security Complaint Site</span>
                </div>
            </a>
        </div>
    </nav>

    <main class="error-page">
        <div class="error-inner">
            <div class="error-icon">
                <!-- Heroicons: wifi off -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path
                        d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" />
                    <line x1="2" y1="2" x2="22" y2="22" />
                </svg>
            </div>
            <h1 class="error-title">No Internet Connection</h1>
            <p class="error-sub">It looks like you are offline. Please check your internet connection and try again.
                Your complaint data has not been lost.</p>
            <div class="error-actions">
                <button class="btn-primary" onclick="window.location.reload()">Try Again</button>
                <a href="./index.html" class="btn-secondary">Back to Home</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <span id="copyright">&copy; 2025 Social Security Complaint Site. All rights reserved.</span>
        </div>
    </footer>

    <script src="./scripts/error.js"></script>
</body>

</html>
